<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ ishchi.name }} {{ ishchi.surname }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
        }
        nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e0e0e5;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-inner {
            max-width: 1100px; margin: 0 auto;
            padding: 0 24px; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 17px; font-weight: 600; color: #1d1d1f; text-decoration: none; }
        .back { color: #0071e3; text-decoration: none; font-size: 15px; }
        .back:hover { text-decoration: underline; }

        .profile {
            max-width: 750px;
            margin: 60px auto;
            padding: 0 24px;
        }
        .profile-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .profile-card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
        }
        .profile-body { padding: 36px; }
        .profile-name {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .badge {
            display: inline-block;
            margin-top: 12px;
            background: #f5f5f7;
            color: #0071e3;
            padding: 6px 16px;
            border-radius: 980px;
            font-size: 15px;
            font-weight: 500;
        }
        .meta {
            display: flex;
            gap: 24px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
        .meta-item { font-size: 15px; color: #6e6e73; }
        .meta-item strong { display: block; color: #1d1d1f; font-size: 17px; margin-bottom: 2px; }
        .desc-title {
            font-size: 20px;
            font-weight: 600;
            margin-top: 28px;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 16px;
            color: #444;
            line-height: 1.75;
        }
        .date {
            margin-top: 24px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="{% url 'home' %}" class="logo">IshPlatforma</a>
        <a href="{% url 'home' %}" class="back">← Orqaga</a>
    </div>
</nav>

<div class="profile">
    <div class="profile-card">
        {% if ishchi.rasm %}
            <img src="{{ ishchi.rasm.url }}" alt="{{ ishchi.name }}">
        {% endif %}
        <div class="profile-body">
            <div class="profile-name">{{ ishchi.name }} {{ ishchi.surname }}</div>
            <span class="badge">{{ ishchi.sohasi }}</span>

            <div class="meta">
                <div class="meta-item">
                    <strong>{{ ishchi.age }}</strong>
                    Yosh
                </div>
                <div class="meta-item">
                    <strong>{{ ishchi.sohasi }}</strong>
                    Mutaxassislik
                </div>
            </div>

            <div class="desc-title">O'zi haqida</div>
            <div class="desc">{{ ishchi.description }}</div>
            <div class="date">Qo'yilgan sana: {{ ishchi.created_at|date:"d.m.Y" }}</div>
        </div>
    </div>
</div>

</body>
</html>
