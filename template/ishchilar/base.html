<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tizim Boshqaruvi{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Umumiy sahifa uchun Apple minimalizmi */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7; /* Apple'ning standart och kulrang foni */
            color: #1d1d1f;            /* To'q rangli matn (mutlaq qora emas) */
            letter-spacing: -0.01em;   /* Shriftlar orasidagi nafis zichlik */
        }

        /* Apple.com uslubidagi yuqori navigatsiya paneli */
        .apple-nav {
            background-color: rgba(22, 22, 23, 0.8); /* Shaffof to'q rang */
            backdrop-filter: blur(20px);               /* Orqa fonni xiralashtirish (Glassmorphism) */
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
        }

        .apple-brand {
            font-weight: 500;
            font-size: 19px;
            color: #f5f5f7 !important;
            transition: color 0.3s ease;
        }

        .apple-brand:hover {
            color: #86868b !important; /* Sichqoncha kelganda o'chgan rang */
        }

        /* Apple uslubidagi dumaloq va nafis ko'k tugma */
        .apple-btn-primary {
            background-color: #0071e3; /* Apple rasmiy ko'k rangi */
            color: #ffffff;
            border: none;
            border-radius: 980px;      /* Butkul dumaloq burchaklar */
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.2s ease;
        }

        .apple-btn-primary:hover {
            background-color: #147ce5;
            color: #ffffff;
            opacity: 0.9;
        }

        /* Sahifadagi asosiy kontent uchun joy tashlash */
        .main-content {
            padding-top: 40px;
            padding-bottom: 60px;
        }
    </style>
</head>
<body>

    <nav class="navbar apple-nav sticky-top">
        <div class="container">
            <a class="apple-brand text-decoration-none" href="{% url 'foydalanuvchi_list' %}">
                 Tizim Boshqaruvi
            </a>
            <a class="apple-btn-primary text-decoration-none" href="{% url 'foydalanuvchi_create' %}">
                Yangi qo'shish
            </a>
        </div>
    </nav>

    <div class="container main-content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
