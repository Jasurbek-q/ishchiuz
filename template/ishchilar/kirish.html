<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-6px); }
            40%,80% { transform: translateX(6px); }
        }

        body {
            min-height: 100vh;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: #ffffff;
            border: 1px solid #e5e5ea;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.45s cubic-bezier(0.4,0,0.2,1) both;
        }

        .login-icon {
            width: 54px; height: 54px;
            background: #0071e3;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 26px;
        }

        .login-title {
            text-align: center;
            font-size: 21px;
            font-weight: 500;
            color: #1c1c1e;
            margin-bottom: 4px;
            animation: fadeUp 0.4s ease 0.1s both;
        }

        .login-sub {
            text-align: center;
            font-size: 13.5px;
            color: #86868b;
            margin-bottom: 1.75rem;
            animation: fadeUp 0.4s ease 0.13s both;
        }

        .field-label {
            font-size: 12.5px;
            font-weight: 500;
            color: #86868b;
            margin-bottom: 5px;
            display: block;
        }

        .field-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        .field-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: #aeaeb2;
            font-size: 16px;
            pointer-events: none;
        }

        .field-input {
            width: 100%;
            padding: 9px 12px 9px 36px;
            font-size: 14px;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            background: #f5f5f7;
            color: #1c1c1e;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .field-input:focus {
            border-color: #0071e3;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0,113,227,0.13);
        }

        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #aeaeb2;
            font-size: 16px;
            padding: 2px;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #1c1c1e; }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0.25rem 0 1.5rem;
        }

        .btn-login {
            width: 100%;
            padding: 10px;
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 3px rgba(0,113,227,0.25);
        }
        .btn-login:hover {
            background: #0077ed;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0,113,227,0.32);
        }
        .btn-login:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 1.25rem 0;
            color: #aeaeb2;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 0.5px;
            background: #e5e5ea;
        }

        .btn-register {
            width: 100%;
            padding: 9px;
            background: transparent;
            color: #1c1c1e;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: all 0.18s;
        }
        .btn-register:hover {
            background: #f5f5f7;
            color: #1c1c1e;
        }

        .error-box {
            background: #fff0f0;
            border: 1px solid #ffd0d0;
            border-radius: 9px;
            padding: 10px 14px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.4s ease;
            font-size: 13px;
            color: #a32d2d;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-icon">🛡</div>
    <p class="login-title">Xush kelibsiz</p>
    <p class="login-sub">Akkauntingizga kiring</p>

    {% if xato %}
    <div class="error-box">⚠️ {{ xato }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-1">
            <label class="field-label">Email</label>
            <div class="field-wrap">
                <span class="field-icon">✉</span>
                <input type="email" name="email" class="field-input" placeholder="sizning@email.com" required>
            </div>
        </div>

        <div class="mb-1">
            <label class="field-label">Parol</label>
            <div class="field-wrap">
                <span class="field-icon">🔒</span>
                <input type="password" name="password" class="field-input" id="passInput" placeholder="Parolingiz" style="padding-right:38px" required>
                <button type="button" class="eye-btn" onclick="togglePass()">👁</button>
            </div>
        </div>

        <div class="remember-row">
            <input type="checkbox" name="eslab_qol" id="eslab_qol" class="form-check-input">
            <label for="eslab_qol" style="font-size:13px; color:#86868b; cursor:pointer;">
                Meni eslab qol (30 kun)
            </label>
        </div>

        <button type="submit" class="btn-login">Kirish</button>
    </form>

    <div class="divider">yoki</div>
    <a href="{% url 'foydalanuvchi_create' %}" class="btn-register">Ro'yxatdan o'tish</a>
</div>

<script>
function togglePass() {
    const input = document.getElementById('passInput');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
