<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elon qo'yish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
        }
        nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e0e0e5;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-inner {
            max-width: 1100px; margin: 0 auto;
            padding: 0 24px; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 17px; font-weight: 600; color: #1d1d1f; text-decoration: none; }
        .back { color: #0071e3; text-decoration: none; font-size: 15px; }

        .wrap {
            max-width: 560px;
            margin: 60px auto;
            padding: 0 24px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .sub { color: #6e6e73; font-size: 16px; margin-bottom: 36px; }

        .card {
            background: white;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }

        .field { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #6e6e73;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            background: #fafafa;
            transition: border 0.2s;
        }
        input:focus, textarea:focus {
            border-color: #0071e3;
            background: white;
        }
        textarea { resize: vertical; min-height: 120px; }

        /* Rasm yuklash */
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            border: 2px dashed #d2d2d7;
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .file-label:hover { border-color: #0071e3; }
        .file-label span { color: #6e6e73; font-size: 14px; }
        .file-label strong { color: #0071e3; font-size: 15px; }
        input[type="file"] { display: none; }

        #preview {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #0077ed; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="{% url 'home' %}" class="logo">IshPlatforma</a>
        <a href="{% url 'home' %}" class="back">← Orqaga</a>
    </div>
</nav>

<div class="wrap">
    <h1>Elon qo'yish</h1>
    <p class="sub">Ma'lumotlaringizni to'ldiring va elonga qo'ying.</p>

    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="field">
                <label>Ism</label>
                <input type="text" name="name" placeholder="Ismingiz" required>
            </div>

            <div class="field">
                <label>Familiya</label>
                <input type="text" name="surname" placeholder="Familiyangiz" required>
            </div>

            <div class="field">
                <label>Yosh</label>
                <input type="number" name="age" placeholder="Yoshingiz" min="16" max="80" required>
            </div>

            <div class="field">
                <label>Sohasi</label>
                <input type="text" name="sohasi" placeholder="Masalan: Dasturchi, Dizayner..." required>
            </div>

            <div class="field">
                <label>Rasm</label>
                <label class="file-label" for="rasm-input">
                    <strong>📷 Rasm yuklash</strong>
                    <span>JPG, PNG formatlar qabul qilinadi</span>
                </label>
                <input type="file" id="rasm-input" name="rasm" accept="image/*"
                       onchange="previewImage(this)">
                <img id="preview" src="" alt="preview">
            </div>

            <div class="field">
                <label>O'zingiz haqingizda</label>
                <textarea name="description"
                          placeholder="Tajribangiz, ko'nikmalaringiz, ish izlash maqsadingiz..."
                          required></textarea>
            </div>

            <button type="submit" class="btn">Elonga qo'yish →</button>
        </form>
    </div>
</div>

<script>
function previewImage(input) {
    const preview = document.getElementById('preview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>

</body>
</html>
